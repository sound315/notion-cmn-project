<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LLM Chatbot</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #fff; }

    #chat-header {
      padding: 12px 16px;
      background: #f7f7f8;
      border-bottom: 1px solid #e5e5e5;
      font-size: 13px;
      color: #666;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #chat-header .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #10a37f;
    }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scroll-behavior: smooth;
    }

    .message { display: flex; gap: 10px; animation: fadeIn 0.2s ease; }
    .message.user { flex-direction: row-reverse; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
      background: #e5e5e5;
    }
    .message.assistant .avatar { background: #10a37f; }

    .bubble {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .message.user .bubble { background: #10a37f; color: #fff; border-bottom-right-radius: 4px; }
    .message.assistant .bubble { background: #f7f7f8; color: #202123; border-bottom-left-radius: 4px; }

    .typing-indicator span {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #999;
      margin: 0 2px;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); } 40% { transform: translateY(-6px); } }

    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e5e5;
      display: flex;
      gap: 8px;
      background: #fff;
    }

    #user-input {
      flex: 1;
      border: 1px solid #d9d9e3;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 14px;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    #user-input:focus { border-color: #10a37f; }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 10px;
      border: none;
      background: #10a37f;
      color: #fff;
      cursor: pointer;
      font-size: 16px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.1s;
      align-self: flex-end;
    }
    #send-btn:hover { background: #0d8c6e; }
    #send-btn:active { transform: scale(0.95); }
    #send-btn:disabled { background: #ccc; cursor: not-allowed; }
  </style>
</head>
<body>
  <div id="chat-header">
    <div class="status-dot"></div>
    <span>AI 어시스턴트</span>
  </div>

  <div id="messages">
    <div class="message assistant">
      <div class="avatar">🤖</div>
      <div class="bubble">안녕하세요! 무엇을 도와드릴까요? 😊</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="메시지를 입력하세요..." rows="1"></textarea>
    <button id="send-btn" aria-label="전송">➤</button>
  </div>

  <script>
    const API_URL = window.location.origin;
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    let sessionId = null;
    let isStreaming = false;
    const chatHistory = [];

    // 세션 생성
    async function initSession() {
      try {
        const res = await fetch(`${API_URL}/api/v1/chat/sessions`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title: '임베딩 채팅', system_prompt: '당신은 도움이 되는 AI 어시스턴트입니다. 한국어로 답변해 주세요.' }),
        });
        const data = await res.json();
        sessionId = data.data?.session_id;
      } catch (e) { console.warn('세션 생성 실패:', e); }
    }

    function appendMessage(role, content, streaming = false) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = role === 'user' ? '🧑' : '🤖';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      if (streaming) {
        bubble.innerHTML = '<div class="typing-indicator"><span></span><span></span><span></span></div>';
      } else {
        bubble.textContent = content;
      }
      div.appendChild(avatar);
      div.appendChild(bubble);
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return bubble;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text || isStreaming) return;

      inputEl.value = '';
      inputEl.style.height = 'auto';
      isStreaming = true;
      sendBtn.disabled = true;

      appendMessage('user', text);
      chatHistory.push({ role: 'user', content: text });

      const bubble = appendMessage('assistant', '', true);

      try {
        const res = await fetch(`${API_URL}/api/v1/chat/stream`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            messages: [{ role: 'user', content: text }],
            session_id: sessionId || '',
            stream: true,
          }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let fullText = '';
        bubble.textContent = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const data = JSON.parse(line.slice(6));
            if (data.error) { bubble.textContent = `오류: ${data.error}`; break; }
            if (data.done) break;
            if (data.token) {
              fullText += data.token;
              bubble.textContent = fullText;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          }
        }
        chatHistory.push({ role: 'assistant', content: fullText });
      } catch (e) {
        bubble.textContent = `연결 오류가 발생했습니다. (${e.message})`;
      } finally {
        isStreaming = false;
        sendBtn.disabled = false;
        inputEl.focus();
      }
    }

    // 자동 높이 조절
    inputEl.addEventListener('input', function () {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    sendBtn.addEventListener('click', sendMessage);

    initSession();
  </script>
</body>
</html>
